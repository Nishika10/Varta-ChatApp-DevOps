version: '3.8'

services:
  # 1. Database Service
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  # 2. Backend Service
  backend:
    build: ./backend
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - MONGODB_URI=mongodb://mongodb:27017/chatApp
      - JWT_SECRET=my_super_secret_key_123
      - NODE_ENV=development
    depends_on:
      - mongodb

  # 3. Frontend Service
  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mongo-data: