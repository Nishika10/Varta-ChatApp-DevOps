apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: chat-app
spec:
  replicas: 1
  selector:
    matchLabels: 
      app: backend
  template:
    metadata:
      name: backend-pod 
      labels: 
         app: backend
    spec:
      containers:
        - name: chatapp-backend
          image: nishika10/chatapp-backend:latest

          resources:         
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
               memory: "256Mi"
               cpu: "200m"

          ports:
           - containerPort: 5001
           
          env:
          - name: NODE_ENV
            valueFrom:
              configMapKeyRef:
                name: chatapp-config
                key: NODE_ENV
          - name: PORT
            valueFrom:
              configMapKeyRef:
                name: chatapp-config
                key: PORT

          - name: MONGO_INITDB_ROOT_USERNAME
            valueFrom:
              secretKeyRef:
                name: chatapp-secrets
                key: MONGO_INITDB_ROOT_USERNAME
          - name: MONGO_INITDB_ROOT_PASSWORD
            valueFrom:
              secretKeyRef:
                name: chatapp-secrets
                key: MONGO_INITDB_ROOT_PASSWORD

          - name: MONGODB_URI
            value: "mongodb://$(MONGO_INITDB_ROOT_USERNAME):$(MONGO_INITDB_ROOT_PASSWORD)@mongodb-service:27017/chatApp?authSource=admin"

          - name: JWT_SECRET
            valueFrom:
              secretKeyRef:
                name: chatapp-secrets
                key: jwt

          - name: CLOUDINARY_CLOUD_NAME
            valueFrom:
             secretKeyRef:
               name: chatapp-secrets
               key: CLOUDINARY_CLOUD_NAME
          - name: CLOUDINARY_API_KEY
            valueFrom:
              secretKeyRef:
                 name: chatapp-secrets
                 key: CLOUDINARY_API_KEY
          - name: CLOUDINARY_API_SECRET
            valueFrom:
              secretKeyRef:
                name: chatapp-secrets
                key: CLOUDINARY_API_SECRET
            