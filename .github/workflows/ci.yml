name: CI Pipeline for Varta-ChatApp

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Code checkout
        uses: actions/checkout@v3

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build backend
        run: docker build -t nishika10/chatapp-backend:latest ./backend

      - name: Build frontend
        run: docker build -t nishika10/chatapp-frontend:latest ./frontend

      - name: Trivy image scan backend
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'image'
          image-ref: 'nishika10/chatapp-backend:latest'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      - name: Trivy image scan frontend
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'image'
          image-ref: 'nishika10/chatapp-frontend:latest'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      - name: Push backend
        run: docker push nishika10/chatapp-backend:latest

      - name: Push frontend
        run: docker push nishika10/chatapp-frontend:latest