name: CI Pipeline for Varta-ChatApp

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Code checkout
        uses: actions/checkout@v3  
        with:
          fetch-depth: 0  # full history, not just last commit

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}


      - name: Download Trivy HTML Template # first download then use otherwise html.tpl file not found error
        run: |  # multiple commands below
          mkdir -p trivy-templates
          wget -O trivy-templates/html.tpl https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/html.tpl
    

      # scan source code before even building
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true   #skip vulns which have no fix available
          format: 'template'     # use a template instead of plain text
          template: '@trivy-templates/html.tpl'   # trivy's built-in html template
          output: 'trivy-fs-report.html'   # save output to this file
          exit-code: '0' # 0 so pipeline doesn't die before report uploads and if found vulns and can do 1 to stop the pipeline if vulns found (prod-level)

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build backend
        run: docker build -t nishika10/chatapp-backend:latest ./backend

      - name: Build frontend
        run: docker build -t nishika10/chatapp-frontend:latest ./frontend

      # image scan catches base image vulnerabilities that fs scan misses
      - name: Trivy image scan backend
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'image'
          image-ref: 'nishika10/chatapp-backend:latest'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          format: 'template'
          template: '@trivy-templates/html.tpl'
          output: 'trivy-backend-report.html'
          exit-code: '0'

      - name: Trivy image scan frontend # separate Trivy image scan steps for both the frontend and backend images
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'image'
          image-ref: 'nishika10/chatapp-frontend:latest'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          format: 'template'
          template: '@trivy-templates/html.tpl'
          output: 'trivy-frontend-report.html'
          exit-code: '0'

      # all scans done, safe to push
      - name: Push backend
        run: docker push nishika10/chatapp-backend:latest

      - name: Push frontend
        run: docker push nishika10/chatapp-frontend:latest

      - name: Upload Trivy reports
        uses: actions/upload-artifact@v4
        if: always() # Ensures report is uploaded even if vulnerabilities are found or the pipeline stopped by exit-code: 1 
        with:
          name: Trivy-Security-Reports
          path: |     # | means multiple files below
            trivy-fs-report.html
            trivy-backend-report.html
            trivy-frontend-report.html
          retention-days: 7      # auto-deleted after 7 days from github